# Bi-AST 对照 (v3.2 §7): AST 去 causal mask, 检验 因果 vs 双向
model:
  name: soformer_bi_ast
  display_name: "SOFormer (Bi-AST)"
  family: soformer
  backbone: axial_strip_cnn
  backbone_input_size: 256
  pretrained: false
  backbone_kwargs:
    base_channels: 64
    num_features: 512
    blocks_per_stage: 3
  label_mode: ldl
  loss: soformer
  fusion_layers: 2
  fusion_heads: 8
  coral_num_bins: 19
  head_hidden_dim: 512
  infer_alpha: 0.0
  infer_beta: 0.0
  loss_weights:
    ord: 0.20
    ldl: 0.20
    reg: 0.45
    mono: 0.15
    cal: 0.05
  ablation:
    use_ast: true
    use_ape: true
    use_causal: false
    use_adm: true
    use_hod: true
    use_uncertainty: true
    use_mono: true

data:
  label_mode: ldl
  ldl_sigma_folders: 1.0
